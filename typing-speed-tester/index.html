<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Speed Tester</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wpm-container">
      <header>
        <h1>Typing Speed Tester</h1>
        <p>
          Start typing the paragraph below to trigger the analytics test
          counter.
        </p>
      </header>

      <div class="stats-panel">
        <div class="stat-box">
          <span class="stat-label">Time Remain</span>
          <span id="timer" class="stat-value">60s</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">WPM</span>
          <span id="wpm" class="stat-value">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Accuracy</span>
          <span id="accuracy" class="stat-value">100%</span>
        </div>
      </div>

      <div id="quote-display" class="quote-box"></div>

      <div class="input-area">
        <textarea
          id="quote-input"
          placeholder="Click here and start typing..."
          autocomplete="off"
          autofocus
        ></textarea>
      </div>

      <button id="reset-btn" class="action-btn">Reset Challenge</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
