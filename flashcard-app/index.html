<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcard App with Categories</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>Flashcard Study Tool</h1>
        <p>Select a category, quiz yourself, and track your score!</p>
      </header>

      <div class="control-panel">
        <div class="selector-box">
          <label for="category-select">Category:</label>
          <select id="category-select">
            <option value="all">All Categories</option>
            <option value="frontend">Frontend Web Dev</option>
            <option value="javascript">JavaScript Basics</option>
            <option value="git">Git & GitHub</option>
          </select>
        </div>
        <div class="score-box">
          <span>Score: <strong id="score-counter">0</strong></span>
        </div>
      </div>

      <div class="card-track">
        <div id="flashcard" class="flashcard">
          <div class="card-face card-front">
            <span class="card-category" id="card-cat-display">Category</span>
            <p class="card-text" id="card-question">Loading question...</p>
            <small class="hint-text">Click card to flip and view answer</small>
          </div>
          <div class="card-face card-back">
            <span class="card-category">Answer</span>
            <p class="card-text" id="card-answer">Loading answer...</p>
            <small class="hint-text">Click card again to flip back</small>
          </div>
        </div>
      </div>

      <div class="action-panel">
        <button id="wrong-btn" class="action-btn wrong-btn">
          ❌ Got it Wrong
        </button>
        <button id="correct-btn" class="action-btn correct-btn">
          ✅ Got it Right
        </button>
      </div>

      <div class="navigation-panel">
        <button id="next-btn" class="nav-btn">Skip / Next Card ➡️</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
