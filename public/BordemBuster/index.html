<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boredom Buster — Find Your Next Adventure</title>
  <meta name="description" content="Beat boredom instantly. Discover fun activities tailored to your group size, budget, and mood." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg-orb" aria-hidden="true"></div>
  <div class="bg-orb" aria-hidden="true"></div>
  <div class="bg-orb" aria-hidden="true"></div>

  <a href="/" class="back-btn">← Back to Home</a>

  <button id="themeBtn" class="theme-btn" aria-label="Toggle theme">🌙</button>

  <div class="page-wrap">
    <main class="card">

      <header class="app-header">
        <h1 class="app-title">✨ Boredom Buster</h1>
        <p class="app-tagline">Beat the block. Find your next adventure.</p>
      </header>

      <section class="filters">
        <div class="field">
          <label for="category">Category</label>
          <select id="category" class="glass-input">
            <option value="">🎲 Surprise Me</option>
            <option value="education">📚 Education</option>
            <option value="recreational">🏃 Recreational</option>
            <option value="social">🤝 Social</option>
            <option value="diy">🔧 DIY</option>
            <option value="charity">❤️ Charity</option>
            <option value="cooking">🍳 Cooking</option>
            <option value="relaxation">🧘 Relaxation</option>
            <option value="music">🎵 Music</option>
            <option value="busywork">📋 Busywork</option>
          </select>
        </div>

        <div class="field">
          <label for="participants">Participants</label>
          <input type="number" id="participants" class="glass-input" min="1" max="20" placeholder="e.g. 1 for solo" />
        </div>

        <div class="field">
          <label for="budget">Budget</label>
          <select id="budget" class="glass-input">
            <option value="">💰 Any Budget</option>
            <option value="free">🆓 Completely Free</option>
            <option value="cheap">💸 Spare Change</option>
            <option value="expensive">🤑 Treat Yo' Self</option>
          </select>
        </div>

        <button id="fetchBtn" class="primary-btn">Find Activity</button>
      </section>

      <div id="resultBox" class="result-box" hidden>
        <p id="sourceBadge" class="source-badge"></p>
        <h2 id="activityName" class="activity-name"></h2>
        <div class="pills">
          <span id="pillType"  class="pill"></span>
          <span id="pillPeeps" class="pill"></span>
          <span id="pillCost"  class="pill"></span>
        </div>
        <div class="result-actions">
          <button id="favBtn"   class="icon-btn" title="Favourite">🤍</button>
          <button id="shareBtn" class="icon-btn" title="Copy">📋 Copy</button>
          <button id="againBtn" class="icon-btn secondary" title="Shuffle">🔀 Shuffle</button>
          <button id="completeBtn" class="icon-btn" title="Mark Completed">✅ Done</button>
        </div>
      </div>

      <div id="extraCard" class="extra-card" hidden>
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="history"    role="tab">🕓 History</button>
          <button class="tab"        data-tab="favourites" role="tab">🧡 Favourites</button>
        </div>
        <div id="tab-history"    class="tab-panel active">
          <ul id="historyList"   class="item-list"></ul>
        </div>
        <div id="tab-favourites" class="tab-panel">
          <ul id="favList"       class="item-list"></ul>
        </div>
      </div>

      <div id="progressCard" class="extra-card" hidden>
        <h3>🏆 Progress</h3>
        <div class="progress-stats">
          <p>Completed Activities: <span id="completedCount">0</span></p>
        </div>
        <div class="badges">
          <span class="badge locked" data-target="1">🌱 Beginner Explorer</span>
          <span class="badge locked" data-target="5">🚀 Activity Adventurer</span>
          <span class="badge locked" data-target="10">🏆 Master Explorer</span>
          <span class="badge locked" data-target="25">⭐ Activity Legend</span>
        </div>
      </div>

    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const fetchBtn = document.getElementById('fetchBtn');
        const resultBox = document.getElementById('resultBox');
        const activityName = document.getElementById('activityName');

        // Show result box setup
        if (resultBox) {
            resultBox.removeAttribute('hidden');
            resultBox.style.display = 'block'; 
        }
        if (activityName) {
            activityName.textContent = "Ready! Click the button below.";
        }

        // Clean local dataset matching your 3 filters
        const localActivities = [
            { activity: "Organize your digital photos into folders", type: "busywork", participants: 1, cost: "free" },
            { activity: "Learn how to cook a signature local meal", type: "cooking", participants: 1, cost: "cheap" },
            { activity: "Have a retro board game night with friends", type: "social", participants: 4, cost: "cheap" },
            { activity: "Take a long walk around a nearby nature park", type: "recreational", participants: 1, cost: "free" },
            { activity: "Stargaze from your backyard or window", type: "relaxation", participants: 1, cost: "free" },
            { activity: "Start learning a new language online", type: "education", participants: 1, cost: "free" },
            { activity: "Build a DIY structural project out of scraps", type: "diy", participants: 1, cost: "cheap" }
        ];

        if (fetchBtn) {
            fetchBtn.addEventListener('click', () => {
                fetchBtn.textContent = "Seeking...";
                
                setTimeout(() => {
                    // Grab current UI inputs
                    const targetCategory = document.getElementById('category').value;
                    const targetParticipants = document.getElementById('participants').value;
                    const targetBudget = document.getElementById('budget').value;

                    // Filter based strictly on what's selected
                    const filteredActivities = localActivities.filter(act => {
                        if (targetCategory && act.type !== targetCategory) return false;
                        if (targetParticipants && act.participants !== parseInt(targetParticipants)) return false;
                        if (targetBudget && act.cost !== targetBudget) return false;
                        return true;
                    });

                    // Render match or give a friendly alert
                    if (filteredActivities.length > 0) {
                        const randomIndex = Math.floor(Math.random() * filteredActivities.length);
                        const choice = filteredActivities[randomIndex];

                        if (activityName) activityName.textContent = choice.activity;
                        
                        const t = document.getElementById('pillType');
                        const p = document.getElementById('pillPeeps');
                        const c = document.getElementById('pillCost');
                        
                        if (t) t.textContent = `Type: ${choice.type}`;
                        if (p) p.textContent = `Peeps: ${choice.participants}`;
                        if (c) c.textContent = `Cost: ${choice.cost.charAt(0).toUpperCase() + choice.cost.slice(1)}`;
                    } else {
                        if (activityName) activityName.textContent = "No activities found matching those filters! Try changing your values.";
                        document.getElementById('pillType').textContent = "Type: None";
                        document.getElementById('pillPeeps').textContent = "Peeps: -";
                        document.getElementById('pillCost').textContent = "Cost: -";
                    }

                    fetchBtn.textContent = "Find Activity";
                }, 200);
            });
        }
    });
  </script>
</body>

</html>
